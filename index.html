<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Game / Stream Counter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Game & Stream Counter</h1>
    <p class="tagline">Log played games, count streams, run a timer, and verify entries.</p>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Stream Controls</h2>
      <div class="row">
        <div>
          <button id="newStreamBtn">New Stream</button>
          <button id="resetStreamsBtn">Reset Streams</button>
        </div>
        <div class="counter">Streams: <span id="streamCount">0</span></div>
      </div>
    </section>

    <section class="panel">
      <h2>Timer</h2>
      <div class="timer">
        <div id="timerDisplay">00:00:00</div>
        <div class="row">
          <button id="startBtn">Start</button>
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
          <button id="attachTimeBtn" title="Attach elapsed time to the current stream entry (if one is being edited)">Attach Time to Entry</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>Add Game Entry</h2>
      <form id="gameForm">
        <label>Game name
          <input type="text" id="gameName" placeholder="Enter game title" required />
        </label>
        <label>Duration (optional)
          <input type="text" id="gameDuration" placeholder="e.g. 1:20 or leave blank to attach timer" />
        </label>
        <div class="row">
          <button type="submit">Add to Log</button>
          <button type="button" id="verifyBtn">Verify</button>
        </div>
        <div id="verifyResults" class="verify-results" aria-live="polite"></div>
      </form>
    </section>

    <section class="panel">
      <h2>Log</h2>
      <div class="row">
        <button id="clearLogBtn">Clear Log</button>
        <button id="exportBtn">Export JSON</button>
        <button id="importBtn">Import JSON</button>
      </div>
      <ul id="logList" class="log-list"></ul>

      <div id="importArea" class="import-area hidden">
        <textarea id="importTextarea" placeholder='Paste JSON here'></textarea>
        <div class="row">
          <button id="doImportBtn">Import</button>
          <button id="cancelImportBtn">Cancel</button>
        </div>
      </div>
    </section>

    <footer>
      <p>Verification is local: suggestions come from a built-in list and a quick web search link if you want to look it up online.</p>
    </footer>
  </main>

<script>
// Simple single-file app. Data stored in localStorage so it works offline.
const STORAGE_KEY = 'gameLogs_v1';
const STREAM_KEY = 'streamCount_v1';
const TIMER_KEY = 'timerState_v1';

// A small local list of known games to help verification. Extend as needed.
const knownGames = [
  'The Legend of Zelda: Breath of the Wild',
  'Elden Ring',
  'Minecraft',
  'Fortnite',
  'Overwatch',
  'Hollow Knight',
  'Stardew Valley',
  'Hades',
  'Animal Crossing: New Horizons',
  'Skyrim',
  'Cyberpunk 2077',
  'Dark Souls III',
  'Persona 5',
  'Super Mario Odyssey'
];

let logs = [];
let streamCount = 0;

// Timer state
let timer = {
  running: false,
  startAt: null, // timestamp when started
  elapsedBefore: 0 // ms
};
let timerInterval = null;

// Utility
function $(id) { return document.getElementById(id); }
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    localStorage.setItem(STREAM_KEY, String(streamCount));
    localStorage.setItem(TIMER_KEY, JSON.stringify(timer));
  } catch (e) {
    console.warn('Could not save to localStorage', e);
  }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    logs = raw ? JSON.parse(raw) : [];
    streamCount = parseInt(localStorage.getItem(STREAM_KEY) || '0', 10);
    const rawTimer = localStorage.getItem(TIMER_KEY);
    timer = rawTimer ? JSON.parse(rawTimer) : timer;
  } catch (e) {
    console.warn('Could not load from localStorage', e);
  }
}

function render() {
  $('logList').innerHTML = '';
  logs.forEach((entry, idx) => {
    const li = document.createElement('li');
    li.className = 'log-item';
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `<strong>${escapeHtml(entry.name)}</strong> <span class="tag">${escapeHtml(entry.duration || '')}</span>`;
    const info = document.createElement('div');
    info.className = 'info';
    info.textContent = `Added: ${new Date(entry.addedAt).toLocaleString()}`;
    if (entry.verified) {
      const v = document.createElement('span'); v.className = 'verified'; v.textContent = 'Verified';
      meta.appendChild(v);
    } else {
      const verifyBadge = document.createElement('button');
      verifyBadge.textContent = 'Mark verified';
      verifyBadge.className = 'small-btn';
      verifyBadge.addEventListener('click', () => { logs[idx].verified = true; saveState(); render(); });
      meta.appendChild(verifyBadge);
    }

    function resetTimer() {
        stopTimer();
        totalSeconds = 0;
        document.getElementById("timer-display").innerText = "00:00:00";
    }

    // 4. DATABASE REGISTRY CROSS-EXAMINATION ENGINE
    let verifiedGameName = "";
    let searchTimeout = null;

    function searchGameDB() {
        clearTimeout(searchTimeout);
        const query = document.getElementById("game-title").value.trim();
        const suggestionsBox = document.getElementById("search-suggestions");
        
        if (query.length < 3) {
            suggestionsBox.classList.add("hidden");
            return;
        }

        searchTimeout = setTimeout(() => {
            fetch(`https://openlibrary.org{encodeURIComponent(query)}&limit=4`)
                .then(res => res.json())
                .then(data => {
                    suggestionsBox.innerHTML = "";
                    if (data.docs && data.docs.length > 0) {
                        suggestionsBox.classList.remove("hidden");
                        data.docs.forEach(doc => {
                            const item = document.createElement("div");
                            item.className = "suggestion-item";
                            let gameTitleClean = doc.title;
                            item.innerText = "🎮 " + gameTitleClean;
                            item.onclick = () => selectVerifiedGame(gameTitleClean);
                            suggestionsBox.appendChild(item);
                        });
                    } else {
                        const mockMatch = ["elden ring", "minecraft", "call of duty", "fortnite", "gta 5", "halo", "valorant", "counter strike", "apex legends", "league of legends", "wow", "roblox"]
                            .find(g => g.includes(query.toLowerCase()));
                        if (mockMatch) {
                            suggestionsBox.classList.remove("hidden");
                            const item = document.createElement("div");
                            item.className = "suggestion-item";
                            item.innerText = "🎮 " + mockMatch.toUpperCase();
                            item.onclick = () => selectVerifiedGame(mockMatch.toUpperCase());
                            suggestionsBox.appendChild(item);
                        }
                    }
                }).catch(() => {
                    suggestionsBox.classList.add("hidden");
                });
        }, 300);
    }

    function selectVerifiedGame(name) {
        verifiedGameName = name;
        document.getElementById("game-title").value = name;
        document.getElementById("search-suggestions").classList.add("hidden");
        
        const badge = document.getElementById("selected-game-badge");
        badge.innerText = `✓ Verified Registry Match: ${name}`;
        badge.className = "badge-status verified-success";
        
        const btn = document.getElementById("log-submit-btn");
        btn.classList.remove("disabled");
        btn.disabled = false;
    }

    // 5. SESSION DATA SUBMISSION METRICS
    function logGameSession() {
        const hours = document.getElementById("game-hours").value;
        if (!verifiedGameName || !hours.trim() || hours <= 0) return;

        const questList = document.getElementById("quest-list");
        const logId = "log-" + Date.now();

        const logItem = document.createElement("div");
        logItem.className = "quest-item game-log-item";
        logItem.id = logId;
        logItem.innerHTML = `
            <span class="quest-text">🎮 Verified Game Log: <strong>${verifiedGameName}</strong> for <strong>${hours} hrs</strong> <span class="verified-tag">✓ Database Authenticated</span></span>
            <button onclick="removeLog('${logId}')" class="btn delete-btn">Clear</button>
        `;

        questList.prepend(logItem);
        
        document.getElementById("game-title").value = "";
        document.getElementById("game-hours").value = "";
        const badge = document.getElementById("selected-game-badge");
        badge.innerText = "No game verified yet";
        badge.className = "badge-status hidden";
        
        const btn = document.getElementById("log-submit-btn");
        btn.classList.add("disabled");
        btn.disabled = true;
        
        verifiedGameName = "";
        gainXP(40); 
    }

    function removeLog(id) {
        const item = document.getElementById(id);
        if (item) item.remove();
    }

    // 6. CUSTOM STREAM TASK WORKSPACE
    function addQuest() {
        const questText = document.getElementById("quest-input").value;
        if (!questText.trim()) return;

        const questList = document.getElementById("quest-list");
        const questId = "quest-" + Date.now();

        const questItem = document.createElement("div");
        questItem.className = "quest-item";
        questItem.id = questId;
        questItem.innerHTML = `
            <span class="quest-text">📝 Memo: ${questText}</span>
            <button onclick="completeQuest('${questId}')" class="btn complete-btn">Clear (+25 XP)</button>
        `;

        questList.prepend(questItem);
        document.getElementById("quest-input").value = "";
    }

    function completeQuest(id) {
        const item = document.getElementById(id);
        if (!item) return;
        item.remove();
        gainXP(25);
    }

    // 7. RPG LEVEL INCREMENT FORMULA
    function gainXP(amount) {
        currentXP += amount;
        if (currentXP >= xpNeededForNextLevel) {
            currentXP = currentXP - xpNeededForNextLevel;
            currentLevel++;
            xpNeededForNextLevel = Math.floor(xpNeededForNextLevel * 1.5);
            alert(`🎉 LEVEL UP! L0C0Dill reached Level ${currentLevel}!`);
        }
        document.getElementById("level-display").innerText = currentLevel;
        document.getElementById("xp-display").innerText = currentXP;
        document.getElementById("next-level-xp").innerText = xpNeededForNextLevel;
        const pct = (currentXP / xpNeededForNextLevel) * 100;
        document.getElementById("xp-bar-fill").style.width = pct + "%";
    }
</script>
